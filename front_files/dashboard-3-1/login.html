<!DOCTYPE html>
<html lang="ar" dir="rtl">


    <head>
        <meta charset="utf-8" />
        <title>تسجيل الدخول — سمارت فيچن</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" href="assets/images/imgs/sv-icon.svg">
        <link href="assets/css/vendor.min.css" rel="stylesheet" type="text/css" />
        <link href="assets/css/app-rtl.min.css" rel="stylesheet" type="text/css" id="app-style" />
        <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css" />
        
        <!-- Custom css -->
        <link href="assets/css/custom.css" rel="stylesheet" type="text/css" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Cairo:wght@200..1000&display=swap" rel="stylesheet">

        <!-- Theme Config Js -->
        <script src="assets/js/config.js"></script>
    </head>

    <body>

        <div class="auth-bg d-flex min-vh-100 justify-content-center align-items-center position-relative">
            <div class="row g-0 justify-content-center w-100 m-xxl-5 px-xxl-4 m-3">
                <div class="auth-container col-xl-4 col-lg-5 col-md-6 d-flex bg-white shadow-lg ">
                    <div class="card overflow-hidden text-center h-100 p-xxl-4 p-3 mb-0 flex-fill w-50 bg-transparent shadow-none">
                        <a href="#" class="auth-brand mb-4">
                            <img src="assets/images/imgs/sv-logo.png" alt="logo light">
                        </a>

                        <h4 class="fw-semibold mb-2 fs-18">سجل الدخول إلى حسابك</h4>

                        <p class="mb-4 opacity-75">أدخل بريدك الإلكتروني وكلمة المرور للوصول إلى لوحة التحكم.</p>

                        <form action="https://coderthemes.com/highdmin/layouts/index.html" class="text-start mb-3">
                            <div class="mb-3 email-input position-relative">
                                <label class="form-label" for="example-email">البريد الإلكتروني</label>
                                <input type="email" id="example-email" name="example-email" class="form-control" placeholder="أدخل بريدك الإلكتروني هنا">
                            </div>

                            <div class="mb-3 password-input position-relative">
                                <label class="form-label" for="example-password">كلمة المرور</label>
                                <input type="password" id="example-password" class="form-control" placeholder="أدخل كلمة المرور هنا">
                                <div class="text-end">
                                    <a href="#" class="opacity-50 fs-12 text-black">هل نسيت كلمة المرور؟</a>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="contentType" id="contentNews" value="news">
                                    <label class="form-check-label" for="contentNews">عربي</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="contentType" id="contentArticle" value="article">
                                    <label class="form-check-label" for="contentArticle">English</label>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="checkbox-signin">
                                    <label class="form-check-label" for="checkbox-signin">تذكرني</label>
                                </div>

                            </div>

                            <div class="d-grid">
                                <button class="button">
                                    <span class="fw-bold text-white">تسجيل الدخول</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 66 43">
                                        <polygon points="26.42,4.46 21.89,0 0,21.5 21.89,43 26.42,38.54 9.06,21.5"></polygon>
                                        <polygon points="46.21,4.46 41.68,0 19.79,21.5 41.68,43 46.21,38.54 28.85,21.5"></polygon>
                                        <polygon points="66,4.46 61.47,0 39.58,21.5 61.47,43 66,38.54 48.64,21.5"></polygon>
                                    </svg>
                                </button>
                            </div>
                        </form>

                        <p class="opacity-75 fs-14 mb-4">ليس لديك حساب؟<a href="#" class="fw-bold ms-1 text-black">إنشاء حساب جديد</a></p>

                        <p class="mt-auto mb-0 fs-6">
                            <script>document.write(new Date().getFullYear())</script> © Smart Vision</span>
                        </p>
                    </div>
                    <div class="flex-fill w-50 p-xxl-4 p-3 d-flex justify-content-center align-items-center flex-column">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-person mb-2" viewBox="0 0 16 16">
                            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                            <path d="M8 9a5 5 0 0 0-5 5v1h10v-1a5 5 0 0 0-5-5z"/>
                        </svg>
                        <span class="fs-1 fw-bold">مرحباً بك</span>
                        <span class="opacity-50">يرجى تسجيل الدخول للوصول إلى لوحة التحكم.</span>
                    </div>
                </div>
            </div>
        </div>

        <script src="assets/js/vendor.min.js"></script>
        <script src="assets/js/app.js"></script>

    </body>


</html>
